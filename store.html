<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Store &mdash; Awesome degoog extensions</title>
    <script>
      (function () {
        try {
          var t = localStorage.getItem("ade:theme");
          if (t !== "light" && t !== "dark") {
            t = window.matchMedia("(prefers-color-scheme: dark)").matches
              ? "dark"
              : "light";
          }
          document.documentElement.setAttribute("data-theme", t);
        } catch (e) {}
      })();
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap"
    />
    <link rel="stylesheet" href="assets/libraries/bulma.min.css" />
    <link rel="stylesheet" href="assets/style.css" />
  </head>
  <body data-page="store">
    <section class="hero is-small">
      <div class="hero-body">
        <div class="container">
          <p class="mb-3">
            <a
              href="index.html"
              class="has-text-grey is-flex is-align-items-center"
              style="gap: 8px"
            >
              <svg
                width="24"
                height="24"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M19 12H5M12 19l-7-7 7-7"></path>
              </svg>
              All stores
            </a>
          </p>
          <div id="ade-store-head" aria-busy="true">
            <div class="ade-store-head">
              <div class="ade-store-head-media">
                <div class="ade-skeleton-block ade-store-img"></div>
                <div class="ade-store-head-content" style="flex: 1 1 auto">
                  <p class="ade-skeleton-line" style="width: 50%"></p>
                  <p class="ade-skeleton-line ade-skeleton-line-short"></p>
                  <p class="ade-skeleton-line"></p>
                </div>
              </div>
            </div>
          </div>
          <div class="field is-grouped is-align-items-center mt-4">
            <p class="control is-expanded">
              <input
                id="ade-filter"
                class="input"
                type="search"
                placeholder="Filter items..."
                autocomplete="off"
              />
            </p>
            <div id="ade-tabs" class="buttons has-addons mb-0"></div>
          </div>
        </div>
      </div>
    </section>
    <main class="section">
      <div class="container">
        <div id="ade-items" class="columns is-multiline">
          <template id="ade-item-skel-tmpl">
            <div class="column is-one-third-desktop is-half-tablet">
              <div class="card ade-card ade-card-skeleton">
                <div class="card-content">
                  <div
                    class="is-flex is-justify-content-space-between is-align-items-flex-start mb-2"
                    style="gap: 8px"
                  >
                    <p
                      class="ade-skeleton-line"
                      style="width: 60%; height: 14px; flex: 1 1 auto"
                    ></p>
                    <span
                      class="ade-skeleton-block"
                      style="
                        width: 52px;
                        height: 20px;
                        border-radius: 999px;
                        flex-shrink: 0;
                      "
                    ></span>
                  </div>
                  <p class="ade-skeleton-line" style="height: 11px"></p>
                  <p
                    class="ade-skeleton-line ade-skeleton-line-short"
                    style="height: 11px; margin-bottom: 0"
                  ></p>
                  <div class="ade-card-meta tags" style="padding-top: 12px">
                    <span
                      class="ade-skeleton-block"
                      style="
                        width: 52px;
                        height: 22px;
                        border-radius: 999px;
                        display: inline-block;
                      "
                    ></span>
                  </div>
                </div>
              </div>
            </div>
          </template>
          <script>
            (function () {
              var t = document.getElementById("ade-item-skel-tmpl");
              var g = t.parentElement;
              for (var i = 0; i < 3; i++)
                g.appendChild(t.content.cloneNode(true));
              g.removeChild(t);
            })();
          </script>
        </div>
        <div
          id="ade-error"
          class="notification is-danger is-light"
          hidden
        ></div>
      </div>
    </main>
    <script src="assets/libraries/marked.min.js"></script>
    <script type="module" src="assets/js/main.js"></script>
  </body>
</html>
