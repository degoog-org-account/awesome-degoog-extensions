<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <script>
      (function () {
        var p = new URLSearchParams(location.search);
        var repo = p.get("repo") || "";
        var path = p.get("path") || "";
        location.replace(
          "index.html#repo=" +
            encodeURIComponent(repo) +
            "&ext=" +
            encodeURIComponent(path)
        );
      })();
    </script>
  </head>
  <body></body>
</html>
